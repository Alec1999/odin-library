<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Library Project</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <svg style="display: none;">
        <symbol id="icon-trashcan" viewBox="0 0 24 24">
            <path d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z" />
        </symbol>
    </svg>

    <main>
        <div class="library-container"></div>
        <button command="show-modal" commandfor="new-book-dialog">New Book</button>

        <dialog id="new-book-dialog">
            <p>Enter new book information</p>
            <form method="dialog" id="new-book-form">
                <label for="book-title">Title:</label>
                <input type="text" id="book-title" name="title">

                <label for="book-author">Author:</label>
                <input type="text" id="book-author" name="author">

                <label for="book-pages">Total # of Pages:</label>
                <input type="text" id="book-pages" name="pages">

                <fieldset>
                    <legend>Have you finished it?</legend>

                    <input type="radio" id="already-read" name="already-read" value="yes">
                    <label for="already-read">Yes</label>
                    
                    <input type="radio" id="not-read" name="already-read" value="no">
                    <label for="not-read">No</label>
                </fieldset>

                <button type="submit" id="submit-new-book-btn">Submit</button>
            </form>    
        </dialog>
    </main>
</body>
</html>
