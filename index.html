<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Library Project</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <main>
        <div class="library-container"></div>
        <button popovertarget="my-dialog">New Book</button>

        <dialog id="my-dialog" popover>
            <p>Enter new book information</p>
            <label for="book-title">Title:</label>
            <input type="text" id="book-title" name="title">

            <label for="book-author">Author:</label>
            <input type="text" id="book-author" name="author">

            <label for="book-pages">Total # of Pages:</label>
            <input type="text" id="book-pages" name="pages">

            <fieldset>
                <legend>Have you finished it?</legend>

                <input type="radio" id="already-read" name="already-read" value="yes">
                <label for="already-read">Yes</label>
                
                <input type="radio" id="not-read" name="already-read" value="no">
                <label for="not-read">No</label>
            </fieldset>
            
            <button popovertarget="my-dialog" popovertargetaction="hide">Close</button>
        </dialog>
    </main>
</body>
</html>
